# ============================================
# Netlify Deployment Configuration
# Optimized for SEO & Performance
# ============================================

[build]
  publish = "."

# Asset optimization
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Force HTTPS (SEO best practice — single canonical URL)
[[redirects]]
  from = "http://radyahmd.netlify.app/*"
  to = "https://radyahmd.netlify.app/:splat"
  status = 301
  force = true

# Trailing slash consistency (prevents duplicate pages in Google)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true
